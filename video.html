<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Player</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css" />
</head>
<body>
  <h1>Sermoning</h1>
  <p>This is a player test.</p>
  <p>Below is the new player which is meant to replace Vidstack.</p>
  <div class="plyr__video-embed" id="player">
  <iframe
    src="https://www.youtube.com/watch?v=BIUDMm-Ev7Y"
    allowfullscreen
    allowtransparency
    allow="autoplay"
  ></iframe>
</div>
  <script src="https://cdn.plyr.io/3.8.4/plyr.js"></script>
  <script>
    const player = new Plyr('#player');
  </script>
